<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Agent Action QA Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html { color-scheme: dark; }
  :root{
    --bg0:#0b1220;
    --bg1:#0f172a;
    --panel: rgba(17,28,51,.88);
    --panel2: rgba(15,26,47,.88);

    --text:#e5e7eb;
    --muted:#94a3b8;

    --border: rgba(148,163,184,.18);
    --ring: rgba(124,58,237,.35);

    --accent:#7c3aed;
    --accent2:#22c55e;
    --danger:#ef4444;
    --warning:#f59e0b;
    --info:#60a5fa;

    --shadow: 0 20px 50px rgba(0,0,0,.45);
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    font-size:14px;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(900px 600px at 10% 10%, rgba(124,58,237,.20), transparent 55%),
      radial-gradient(900px 600px at 90% 15%, rgba(34,197,94,.12), transparent 55%),
      radial-gradient(900px 700px at 50% 110%, rgba(56,189,248,.10), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
  }

  .layout{ display:flex; height:100vh; }

  /* Sidebar */
  .sidebar{
    width:260px;
    flex-shrink:0;
    background: var(--panel2);
    border-right:1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display:flex;
    flex-direction:column;
    padding:20px 0;
  }
  .sidebar h1{
    font-size:1.05rem;
    font-weight:800;
    padding:0 20px 18px;
    margin:0;
    border-bottom:1px solid var(--border);
    letter-spacing:.2px;
  }
  .nav-item{
    padding:12px 20px;
    cursor:pointer;
    color:var(--muted);
    border-left:3px solid transparent;
    font-weight:600;
    font-size:.92rem;
    transition: background .15s ease, color .15s ease;
  }
  .nav-item:hover{ background: rgba(124,58,237,.08); color:var(--text); }
  .nav-item.active{
    color:#c4b5fd;
    border-left-color:var(--accent);
    background: rgba(124,58,237,.10);
  }

  /* Content */
  .content{ flex:1; overflow-y:auto; padding:28px 34px; }
  .view{ display:none; }
  .view.active{ display:block; }
  .view h2{ margin:0 0 18px; font-size:1.25rem; font-weight:800; }

  /* Form */
  form{ max-width:600px; }
  .field{ margin-bottom:16px; }
  label{ display:block; font-weight:700; margin-bottom:6px; font-size:.82rem; color:var(--muted); }
  input[type=text], textarea, select{
    width:100%;
    padding:10px 13px;
    border:1px solid var(--border);
    border-radius:12px;
    font-size:.9rem;
    font-family:inherit;
    background: rgba(3,7,18,.35);
    color:var(--text);
    outline:none;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }
  input::placeholder, textarea::placeholder{ color: rgba(148,163,184,.6); }
  input:focus, textarea:focus, select:focus{
    border-color: rgba(124,58,237,.65);
    box-shadow: 0 0 0 4px var(--ring);
    background: rgba(3,7,18,.55);
  }
  textarea{ min-height:90px; resize:vertical; }

  .risk-options{ display:flex; gap:10px; }
  .risk-option{
    flex:1;
    text-align:center;
    padding:10px;
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    background: rgba(3,7,18,.25);
    color:var(--muted);
    transition: all .15s ease;
  }
  .risk-option:hover{ border-color: rgba(148,163,184,.4); }
  .risk-option.selected-Risky{ background: rgba(239,68,68,.14); border-color: var(--danger); color:#fecaca; }
  .risk-option.selected-Medium{ background: rgba(245,158,11,.14); border-color: var(--warning); color:#fde68a; }
  .risk-option.selected-Normal{ background: rgba(34,197,94,.14); border-color: var(--accent2); color:#bbf7d0; }

  button{
    font-family:inherit;
    border:none;
    cursor:pointer;
  }
  .btn-primary{
    background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(99,102,241,.92));
    color:#fff;
    padding:11px 22px;
    border-radius:12px;
    font-size:.9rem;
    font-weight:800;
    box-shadow: 0 10px 24px rgba(0,0,0,.28);
    transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
  }
  .btn-primary:hover{ transform:translateY(-2px); filter:brightness(1.08); box-shadow: 0 16px 34px rgba(0,0,0,.38); }
  .btn-primary:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  .btn-secondary{
    background: rgba(124,58,237,.10);
    border:1px solid rgba(124,58,237,.35);
    color:#c4b5fd;
    padding:9px 16px;
    border-radius:10px;
    font-size:.85rem;
    font-weight:700;
    transition: background .15s ease, transform .15s ease;
  }
  .btn-secondary:hover{ background: rgba(124,58,237,.18); transform:translateY(-1px); }

  .btn-mini{
    background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(99,102,241,.92));
    color:#fff;
    padding:6px 12px;
    border-radius:9px;
    font-size:.76rem;
    font-weight:800;
    box-shadow: 0 8px 18px rgba(0,0,0,.28);
    transition: transform .15s ease, filter .15s ease;
    white-space:nowrap;
  }
  .btn-mini:hover{ transform:translateY(-2px); filter:brightness(1.08); }

  /* Filters */
  .filters{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .filters input, .filters select{ width:auto; min-width:150px; }

  /* Table */
  .table-container{ overflow-x:auto; border-radius:16px; border:1px solid var(--border); background: rgba(3,7,18,.15); }
  table{ width:100%; border-collapse:collapse; font-size:.84rem; }
  thead th{
    position:sticky; top:0;
    background: linear-gradient(180deg, rgba(15,23,42,.95), rgba(15,26,47,.95));
    text-align:left;
    padding:11px 12px;
    border-bottom:1px solid rgba(148,163,184,.22);
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--muted);
    font-weight:800;
  }
  tbody td{
    padding:9px 10px;
    border-bottom:1px solid rgba(148,163,184,.12);
    vertical-align:middle;
  }
  tbody tr{ background: rgba(17,28,51,.35); transition: background .15s ease; }
  tbody tr:nth-child(even){ background: rgba(15,26,47,.35); }
  tbody tr:hover{ background: rgba(124,58,237,.07); }

  .cell-input{
    width:100%;
    padding:6px 8px;
    border:1px solid transparent;
    border-radius:8px;
    font-size:.82rem;
    font-family:inherit;
    background:transparent;
    color:var(--text);
    outline:none;
    transition: background .15s ease, border-color .15s ease;
  }
  .cell-input:hover{ background: rgba(3,7,18,.3); border-color: var(--border); }
  .cell-input:focus{ background: rgba(3,7,18,.5); border-color: rgba(124,58,237,.55); }
  .cell-input:disabled{ opacity:.5; }

  .cell-select{ cursor:pointer; }

  .badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:999px;
    font-size:.72rem;
    font-weight:800;
    letter-spacing:.02em;
  }
  .badge-Risky{ background: rgba(239,68,68,.16); color:#fca5a5; border:1px solid rgba(239,68,68,.35); }
  .badge-Medium{ background: rgba(245,158,11,.16); color:#fcd34d; border:1px solid rgba(245,158,11,.35); }
  .badge-Normal{ background: rgba(34,197,94,.16); color:#86efac; border:1px solid rgba(34,197,94,.35); }

  .msg{ margin-top:10px; font-size:.82rem; font-weight:600; }
  .msg.success{ color:#86efac; }
  .msg.error{ color:#fca5a5; }

  /* Dashboard cards */
  .cards{ display:flex; gap:16px; margin-bottom:26px; }
  .card{
    flex:1;
    background: var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    backdrop-filter: blur(10px);
  }
  .card .count{ font-size:2rem; font-weight:900; }
  .card .label{ font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700; }
  .card.Risky .count{ color:#fca5a5; }
  .card.Medium .count{ color:#fcd34d; }
  .card.Normal .count{ color:#86efac; }

  .empty-state{ color:var(--muted); padding:30px; text-align:center; font-weight:600; }

  /* Modal */
  .modal{
    display:none;
    position:fixed; z-index:1001;
    left:0; top:0; width:100%; height:100%;
    overflow:auto;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding:16px;
  }
  .modal-content{
    background: linear-gradient(180deg, rgba(17,28,51,.95), rgba(15,26,47,.95));
    margin:3% auto;
    border:1px solid var(--border);
    width:92%;
    max-width:600px;
    border-radius:20px;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .modal-header{
    padding:18px 22px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border);
    background: radial-gradient(700px 200px at 20% 0%, rgba(124,58,237,.18), transparent 55%);
  }
  .modal-header h3{ margin:0; font-size:1.1rem; font-weight:800; }
  .close-button{
    background: rgba(255,255,255,.08);
    color:var(--text);
    border:1px solid rgba(255,255,255,.12);
    width:38px; height:38px;
    border-radius:999px;
    cursor:pointer;
    font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .close-button:hover{ background: rgba(255,255,255,.15); }
  .modal-body{ padding:20px 22px; max-height:60vh; overflow-y:auto; }

  .details-row{
    display:flex; gap:14px; align-items:flex-start;
    padding:11px 12px;
    border:1px solid rgba(148,163,184,.14);
    border-radius:12px;
    background: rgba(3,7,18,.22);
    margin-bottom:9px;
  }
  .details-label{ width:130px; min-width:130px; color:var(--muted); font-weight:800; font-size:.82rem; }
  .details-value{ flex:1; font-weight:600; font-size:.88rem; line-height:1.5; word-break:break-word; }
  .copy-value{
    cursor:pointer;
    border-radius:8px;
    padding:2px 8px;
    display:inline-block;
    border:1px solid rgba(124,58,237,.25);
    background: rgba(124,58,237,.10);
    transition: transform .12s ease, background .12s ease;
  }
  .copy-value:hover{ transform:translateY(-1px); background: rgba(124,58,237,.16); }
  .copy-value.copied{ background: rgba(34,197,94,.25) !important; border-color: rgba(34,197,94,.6) !important; color:#bbf7d0; }
  .details-value textarea{ min-height:70px; }
  .copy-hint{ margin-top:6px; text-align:center; color:rgba(148,163,184,.75); font-size:.78rem; font-weight:600; }

  /* Toast */
  .toast{
    position:fixed;
    left:50%;
    bottom:28px;
    transform: translateX(-50%) translateY(0);
    z-index:9999;
    padding:11px 20px;
    border-radius:999px;
    font-weight:700;
    font-size:.85rem;
    box-shadow: 0 16px 34px rgba(0,0,0,.5);
    pointer-events:none;
    opacity:0;
    transition: opacity .2s ease, transform .2s ease;
    background: rgba(15,26,47,.96);
    border:1px solid var(--border);
    color:var(--text);
  }
  .toast.visible{ opacity:1; transform:translateX(-50%) translateY(-4px); }
  .toast.success{ border-color: rgba(34,197,94,.5); color:#bbf7d0; }
  .toast.error{ border-color: rgba(239,68,68,.5); color:#fecaca; }

  @media (max-width:768px){
    .content{ padding:18px; }
    .sidebar{ width:210px; }
  }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <h1>Agent Action QA</h1>
    <div class="nav-item active" data-view="new-review">+ New Review</div>
    <div class="nav-item" data-view="review-log">Review Log</div>
    <div class="nav-item" data-view="dashboard">Dashboard</div>
  </div>

  <div class="content">

    <!-- NEW REVIEW -->
    <div class="view active" id="new-review">
      <h2>New Review</h2>
      <form id="review-form">
        <div class="field">
          <label>Reviewer Name</label>
          <input type="text" id="f-reviewer" required>
        </div>
        <div class="field">
          <label>Agent Name / ID</label>
          <input type="text" id="f-agent" list="agent-list" required>
          <datalist id="agent-list"></datalist>
        </div>
        <div class="field">
          <label>Ticket ID</label>
          <input type="text" id="f-ticket" required>
        </div>
        <div class="field">
          <label>Action Taken / Resolution</label>
          <textarea id="f-action" required></textarea>
        </div>
        <div class="field">
          <label>Risk Level</label>
          <div class="risk-options" id="risk-options">
            <div class="risk-option" data-risk="Risky">Risky</div>
            <div class="risk-option" data-risk="Medium">Medium</div>
            <div class="risk-option" data-risk="Normal">Normal</div>
          </div>
        </div>
        <div class="field">
          <label>Feedback</label>
          <textarea id="f-feedback" required></textarea>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Submit Review</button>
        <div class="msg" id="form-msg"></div>
      </form>
    </div>

    <!-- REVIEW LOG -->
    <div class="view" id="review-log">
      <h2>Review Log</h2>
      <div class="filters">
        <input type="text" id="filter-agent" placeholder="Filter by agent">
        <input type="text" id="filter-ticket" placeholder="Filter by ticket ID">
        <select id="filter-risk">
          <option value="">All risk levels</option>
          <option value="Risky">Risky</option>
          <option value="Medium">Medium</option>
          <option value="Normal">Normal</option>
        </select>
        <button class="btn-secondary" id="apply-filters">Apply</button>
        <button class="btn-secondary" id="clear-filters">Clear</button>
      </div>
      <div class="table-container" id="log-table-wrap">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="view" id="dashboard">
      <h2>Dashboard</h2>
      <div class="cards">
        <div class="card Risky"><div class="count" id="count-risky">-</div><div class="label">Risky</div></div>
        <div class="card Medium"><div class="count" id="count-medium">-</div><div class="label">Medium</div></div>
        <div class="card Normal"><div class="count" id="count-normal">-</div><div class="label">Normal</div></div>
      </div>
      <h2>By Agent</h2>
      <div class="table-container" id="agent-table-wrap">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

  </div>
</div>

<!-- Details Modal -->
<div id="detailsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Review Details</h3>
      <button class="close-button" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div id="detailsContent"></div>
      <div class="copy-hint">Tip: click any value to copy · feedback autosaves when you click away</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
